<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Little League Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#111;min-height:100vh;padding:10px;-webkit-tap-highlight-color:transparent}
    .screen{display:none}.screen.active{display:block}
    /* Setup */
    .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #ddd}
    label{display:block;font-size:12px;color:#555;margin-bottom:3px;margin-top:10px;font-weight:600}
    label:first-child{margin-top:0}
    input,select{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid #bbb;background:#fff;color:#111;font-size:15px}
    input::placeholder{color:#aaa}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .btn{display:block;width:100%;padding:13px;border-radius:10px;border:none;font-size:16px;font-weight:700;cursor:pointer;text-align:center}
    .btn-primary{background:#c0392b;color:#fff;margin-top:12px}
    .btn-sm{background:#e8eaed;color:#333;font-size:13px;padding:9px;border-radius:8px;border:1px solid #ccc;cursor:pointer;width:100%;font-weight:600}
    .btn:active,.btn-sm:active{opacity:.75}

    /* Header */
    .game-header{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:8px;border:1px solid #ddd}
    .teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;margin-bottom:6px}
    .team-score{text-align:center}
    .team-name{font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
    .score-big{font-size:44px;font-weight:800;line-height:1}
    .score-big.away{color:#c0392b}.score-big.home{color:#1565c0}
    .vs{font-size:16px;color:#bbb;font-weight:700}
    .game-meta{display:flex;justify-content:space-between;font-size:11px;color:#888;padding-top:7px;border-top:1px solid #eee;flex-wrap:wrap;gap:4px;font-weight:600}

    /* Status strip */
    .status-strip{background:#fff;border-radius:12px;padding:10px 13px;margin-bottom:8px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;text-align:center;border:1px solid #ddd}
    .stat-box label{font-size:10px;color:#777;display:block;margin-bottom:1px;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
    .stat-box .val{font-size:19px;font-weight:800;color:#111}
    .val.danger{color:#c0392b}.val.warn{color:#e67e00}
    .outs-row{display:flex;gap:5px;justify-content:center;align-items:center;padding-top:2px}
    .out-dot{width:16px;height:16px;border-radius:50%;border:2.5px solid #bbb;background:transparent;transition:background .15s}
    .out-dot.filled{background:#c0392b;border-color:#c0392b}

    /* Base diamond */
    .diamond-wrap{display:flex;justify-content:center;align-items:center;padding:4px 0}
    .diamond{position:relative;width:60px;height:60px}
    .base{position:absolute;width:16px;height:16px;border:2.5px solid #bbb;transform:rotate(45deg);background:#fff;cursor:pointer;transition:background .15s,border-color .15s}
    .base.on{background:#e67e00;border-color:#e67e00}
    .base-2nd{top:0;left:22px}
    .base-3rd{top:22px;left:0}
    .base-1st{top:22px;left:44px}

    /* Count tracker */
    .count-section{background:#fff;border-radius:12px;padding:10px 13px;margin-bottom:8px;border:1px solid #ddd}
    .count-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .count-header h3{font-size:12px;color:#666;font-weight:700}
    .count-header small{font-size:11px;color:#aaa}
    .count-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .count-box{background:#f5f7fa;border-radius:8px;padding:8px;text-align:center;border:1px solid #e0e0e0}
    .count-box label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;font-weight:700}
    .count-num{font-size:28px;font-weight:800;color:#111;line-height:1}
    .count-btns{display:flex;gap:6px;justify-content:center;margin-top:5px}
    .count-btn{padding:4px 14px;border-radius:6px;border:1.5px solid #bbb;background:#fff;color:#333;font-size:16px;font-weight:700;cursor:pointer}
    .count-btn:active{background:#eee}
    .count-dots{display:flex;gap:4px;justify-content:center;margin-top:4px}
    .count-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid #ccc;background:#fff}
    .count-dot.filled-b{background:#1565c0;border-color:#1565c0}
    .count-dot.filled-s{background:#e67e00;border-color:#e67e00}

    /* Controls */
    .controls{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:8px;border:1px solid #ddd}
    .controls h3{font-size:12px;color:#666;margin-bottom:8px;font-weight:700}
    .batting-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
    .toggle-btn{padding:9px;border-radius:8px;border:2px solid #ddd;cursor:pointer;font-size:12px;font-weight:700;background:#f5f7fa;color:#888}
    .toggle-btn.active-away{border-color:#c0392b;color:#c0392b;background:#fdf0ef}
    .toggle-btn.active-home{border-color:#1565c0;color:#1565c0;background:#eff4fd}
    .ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .ctrl-btn{padding:14px 6px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px}
    .ctrl-btn span{font-size:20px}
    .ctrl-btn small{font-size:10px;font-weight:600;opacity:.85}
    .ctrl-btn:active{transform:scale(.96)}
    .btn-run-home{background:#1565c0;color:#fff}
    .btn-run-away{background:#c0392b;color:#fff}
    .btn-out{background:#333;color:#fff}
    .btn-next{background:#1a7a34;color:#fff;grid-column:span 2}
    .btn-undo{background:#e8eaed;color:#444;width:100%;margin-top:6px;padding:10px;border-radius:8px;border:1px solid #ccc;cursor:pointer;font-size:13px;font-weight:600}

    /* Inning table */
    .inning-section{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:8px;overflow-x:auto;border:1px solid #ddd}
    .inning-section h3{font-size:12px;color:#666;margin-bottom:8px;font-weight:700}
    table{width:100%;border-collapse:collapse;font-size:12px;min-width:280px}
    th{color:#888;font-weight:700;padding:3px 5px;text-align:center;font-size:11px}
    td{padding:5px 5px;text-align:center;border-top:1px solid #eee;color:#111}
    td.team-label{text-align:left;color:#333;font-size:11px;white-space:nowrap;padding-right:6px;font-weight:600}
    td.total-col{font-weight:800;color:#111}
    td.active-inn{background:#ddeeff;border-radius:4px}
    td.at-limit{color:#e67e00;font-weight:700}

    /* Lineup */
    .batter-section{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:8px;border:1px solid #ddd}
    .batter-section h3{font-size:12px;color:#666;margin-bottom:8px;font-weight:700}
    .lineup-scroll{max-height:220px;overflow-y:auto}
    .lineup-item{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:8px;margin-bottom:4px;background:#f5f7fa;cursor:pointer;border:1px solid #e8eaed}
    .lineup-item.is-up{background:#eaf4ec;border:1.5px solid #1a7a34}
    .lineup-item.is-deck{background:#f5f5e8;border:1.5px solid #b8a000}
    .batter-num{font-size:12px;color:#999;width:18px;flex-shrink:0;font-weight:600}
    .batter-name{font-size:14px;color:#111;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
    .base-status{font-size:11px;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;cursor:pointer;font-weight:700}
    .bs-none{background:#f0f0f0;color:#aaa;border:1px solid #ddd}
    .bs-base{background:#fff3cd;color:#7a5800;border:1px solid #e6c200}
    .bs-scored{background:#d4edda;color:#155724;border:1px solid #5a9a6a}
    .bs-out{background:#f8d7da;color:#7a1a1a;border:1px solid #c07070}
    .bat-badge{font-size:11px;padding:2px 7px;border-radius:5px;flex-shrink:0;font-weight:700}
    .badge-up{background:#1a7a34;color:#fff}
    .badge-deck{background:#b8a000;color:#fff}
    .add-batter{display:flex;gap:7px;margin-top:8px}
    .add-batter input{flex:1;padding:8px 10px;border-radius:8px;border:1.5px solid #bbb;background:#fff;color:#111;font-size:13px}
    .add-batter button{padding:8px 12px;border-radius:8px;border:none;background:#c0392b;color:#fff;font-size:13px;cursor:pointer;font-weight:700}
    .next-batter-btn{margin-top:6px;width:100%;padding:9px;border-radius:8px;border:1px solid #ccc;background:#e8eaed;color:#333;font-size:13px;cursor:pointer;font-weight:600}

    /* Misc */
    .game-over-banner{background:#d4edda;border:1.5px solid #5a9a6a;border-radius:10px;padding:11px;text-align:center;margin-bottom:8px;font-size:14px;color:#155724;font-weight:700}
    .past-game{background:#f5f7fa;border-radius:8px;padding:11px;margin-bottom:7px;border:1px solid #e0e0e0}
    .past-game-teams{font-size:14px;font-weight:700;margin-bottom:3px;color:#111}
    .past-game-meta{font-size:12px;color:#888}
  </style>
</head>
<body>

<!-- SETUP -->
<div id="screen-setup" class="screen active">
  <div style="text-align:center;font-size:18px;font-weight:600;margin-bottom:12px;color:#fff">⚾ Little League Tracker</div>
  <div class="card">
    <label>Away Team Name</label>
    <input id="s-away" placeholder="Visitors" maxlength="20">
    <label>Home Team Name</label>
    <input id="s-home" placeholder="Home Team" maxlength="20">
    <div class="row2">
      <div><label>Innings</label>
        <select id="s-innings" onchange="updateSwitchOpts()">
          <option value="4">4</option><option value="5">5</option>
          <option value="6" selected>6</option><option value="7">7</option>
        </select>
      </div>
      <div><label>Limit style</label>
        <select id="s-limit-style" onchange="toggleLimitStyle()">
          <option value="single">Single</option>
          <option value="tiered" selected>Tiered (early/late)</option>
          <option value="none">None</option>
        </select>
      </div>
    </div>
    <div id="single-row" style="display:none">
      <label>Run limit / inning</label>
      <select id="s-rl">
        <option value="3">3</option><option value="4">4</option>
        <option value="5" selected>5</option><option value="6">6</option>
        <option value="7">7</option><option value="10">10</option>
      </select>
    </div>
    <div id="tiered-row">
      <div class="row2">
        <div><label>Early limit</label>
          <select id="s-early">
            <option value="2">2</option><option value="3" selected>3</option>
            <option value="4">4</option><option value="5">5</option>
          </select>
        </div>
        <div><label>Late limit</label>
          <select id="s-late">
            <option value="5">5</option><option value="6">6</option>
            <option value="7">7</option><option value="10" selected>10</option>
            <option value="999">Unlimited</option>
          </select>
        </div>
      </div>
      <label>Switch after inning</label>
      <select id="s-switch"></select>
    </div>
    <button class="btn btn-primary" onclick="startGame()">Start Game</button>
  </div>
  <div id="past-section" style="display:none">
    <div class="card">
      <div style="font-size:12px;color:#888;margin-bottom:8px">Recent Games</div>
      <div id="past-list"></div>
      <button class="btn-sm" style="margin-top:6px" onclick="clearHist()">Clear History</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <button style="background:none;border:none;color:#777;font-size:12px;cursor:pointer" onclick="goSetup()">← New Game</button>
    <span id="g-date" style="font-size:11px;color:#555"></span>
  </div>

  <div id="over-banner" class="game-over-banner" style="display:none"></div>

  <!-- Score header -->
  <div class="game-header">
    <div class="teams-row">
      <div class="team-score"><div class="team-name" id="h-away"></div><div class="score-big away" id="h-ascore">0</div></div>
      <div class="vs">vs</div>
      <div class="team-score"><div class="team-name" id="h-home"></div><div class="score-big home" id="h-hscore">0</div></div>
    </div>
    <div class="game-meta">
      <span id="h-inning">Inning 1</span>
      <span id="h-half"></span>
      <span id="h-limit"></span>
    </div>
  </div>

  <!-- Status strip: outs, inning runs, runs left, bases -->
  <div class="status-strip">
    <div class="stat-box">
      <label>Outs</label>
      <div class="outs-row">
        <div class="out-dot" id="od0"></div>
        <div class="out-dot" id="od1"></div>
        <div class="out-dot" id="od2"></div>
      </div>
    </div>
    <div class="stat-box"><label>Inn Runs</label><div class="val" id="st-innruns">0</div></div>
    <div class="stat-box"><label>Runs Left</label><div class="val" id="st-left">—</div></div>
    <div class="stat-box">
      <label>Bases</label>
      <div class="diamond-wrap">
        <div class="diamond">
          <div class="base base-2nd" id="b2" onclick="toggleBase(1)"></div>
          <div class="base base-3rd" id="b3" onclick="toggleBase(2)"></div>
          <div class="base base-1st" id="b1" onclick="toggleBase(0)"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Ball/Strike count -->
  <div class="count-section">
    <div class="count-header">
      <h3>Count (optional)</h3>
      <small>resets on next batter</small>
    </div>
    <div class="count-row">
      <div class="count-box">
        <label>Balls</label>
        <div class="count-num" id="ct-balls">0</div>
        <div class="count-dots" id="ball-dots"></div>
        <div class="count-btns">
          <button class="count-btn" onclick="adjCount('balls',-1)">−</button>
          <button class="count-btn" onclick="adjCount('balls',1)">+</button>
        </div>
      </div>
      <div class="count-box">
        <label>Strikes</label>
        <div class="count-num" id="ct-strikes">0</div>
        <div class="count-dots" id="strike-dots"></div>
        <div class="count-btns">
          <button class="count-btn" onclick="adjCount('strikes',-1)">−</button>
          <button class="count-btn" onclick="adjCount('strikes',1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <h3>Batting team</h3>
    <div class="batting-toggle">
      <button class="toggle-btn" id="tog-away" onclick="setHalf('away')"></button>
      <button class="toggle-btn" id="tog-home" onclick="setHalf('home')"></button>
    </div>
    <div class="ctrl-grid">
      <button class="ctrl-btn btn-run-away" onclick="addRun('away')"><span>+1</span><small id="cl-away">Away run</small></button>
      <button class="ctrl-btn btn-run-home" onclick="addRun('home')"><span>+1</span><small id="cl-home">Home run</small></button>
      <button class="ctrl-btn btn-out" onclick="addOut()"><span>OUT</span><small>record out</small></button>
      <button class="ctrl-btn btn-next" onclick="nextHalf()"><span>→</span><small id="cl-next">End half</small></button>
    </div>
    <button class="btn-undo" onclick="undo()">↩ Undo last action</button>
  </div>

  <!-- Inning table -->
  <div class="inning-section">
    <h3>Inning breakdown</h3>
    <div style="overflow-x:auto"><table id="inn-table"></table></div>
  </div>

  <!-- Lineup -->
  <div class="batter-section">
    <h3>Batting order — <span id="lineup-team"></span></h3>
    <div class="lineup-scroll" id="lineup-list"></div>
    <div class="add-batter">
      <input id="new-batter" placeholder="Player name / #" maxlength="30" onkeydown="if(event.key==='Enter')addBatter()">
      <button onclick="addBatter()">Add</button>
    </div>
    <button class="next-batter-btn" onclick="advanceBatter()">Next batter ↓</button>
  </div>
</div>

<script>
  const LSK='llsg2_state', LSH='llsg2_hist';
  let g=null;

  // ── Limit helpers ─────────────────────────────────────────────
  function limitFor(inningIdx){
    if(!g) return 0;
    if(g.limitStyle==='none') return 0;
    if(g.limitStyle==='single') return g.runLimit||0;
    // tiered
    const late = g.lateLimit===999?0:g.lateLimit||0;
    return inningIdx < g.switchAfter ? (g.earlyLimit||0) : late;
  }

  // ── Setup UI ──────────────────────────────────────────────────
  function toggleLimitStyle(){
    const v=document.getElementById('s-limit-style').value;
    document.getElementById('single-row').style.display=v==='single'?'block':'none';
    document.getElementById('tiered-row').style.display=v==='tiered'?'block':'none';
  }
  function updateSwitchOpts(){
    const n=parseInt(document.getElementById('s-innings').value);
    const sel=document.getElementById('s-switch');
    const cur=parseInt(sel.value)||3;
    sel.innerHTML='';
    for(let i=1;i<n-1;i++){
      const o=document.createElement('option');
      o.value=i; o.textContent=`${i} (late starts inn ${i+1})`;
      if(i===cur) o.selected=true;
      sel.appendChild(o);
    }
  }

  // ── Game state ────────────────────────────────────────────────
  function newGame(away,home,innings,limitStyle,runLimit,earlyLimit,lateLimit,switchAfter){
    const z=n=>Array(n).fill(0);
    return {away,home,innings,limitStyle,runLimit,earlyLimit,lateLimit,switchAfter,
      awayRuns:z(innings),homeRuns:z(innings),
      outs:0,inning:0,half:'away',gameOver:false,
      bases:[false,false,false], // 1st,2nd,3rd
      balls:0,strikes:0,
      lineupAway:[],lineupHome:[],
      batterAway:0,batterHome:0,
      playerStatus:{}, // key: "away-0" => 'none'|'base'|'scored'|'out'
      date:new Date().toLocaleDateString(),
      _hist:[]
    };
  }

  function save(){ localStorage.setItem(LSK,JSON.stringify(g)); }
  function snap(){ return JSON.stringify(g); }
  function pushSnap(s){ g._hist.push(s); if(g._hist.length>40) g._hist.shift(); }

  function loadPast(){ try{ return JSON.parse(localStorage.getItem(LSH))||[]; }catch{ return []; } }
  function saveToPast(gm){
    const h=loadPast();
    h.unshift({away:gm.away,home:gm.home,aScore:sum(gm.awayRuns),hScore:sum(gm.homeRuns),date:gm.date,innings:gm.innings});
    if(h.length>6) h.pop();
    localStorage.setItem(LSH,JSON.stringify(h));
  }
  function clearHist(){ localStorage.removeItem(LSH); showSetup(); }
  function sum(a){ return a.reduce((x,y)=>x+y,0); }

  // ── Navigation ────────────────────────────────────────────────
  function startGame(){
    const away=document.getElementById('s-away').value.trim()||'Away';
    const home=document.getElementById('s-home').value.trim()||'Home';
    const innings=parseInt(document.getElementById('s-innings').value);
    const limitStyle=document.getElementById('s-limit-style').value;
    const runLimit=parseInt(document.getElementById('s-rl').value)||0;
    const earlyLimit=parseInt(document.getElementById('s-early').value)||0;
    const lateLimit=parseInt(document.getElementById('s-late').value)||0;
    const switchAfter=parseInt(document.getElementById('s-switch').value)||3;
    g=newGame(away,home,innings,limitStyle,runLimit,earlyLimit,lateLimit,switchAfter);
    save(); showGame();
  }
  function goSetup(){
    if(g&&!g.gameOver){ if(!confirm('End current game?')) return; saveToPast(g); }
    localStorage.removeItem(LSK); g=null; showSetup();
  }
  function showSetup(){
    document.getElementById('screen-setup').classList.add('active');
    document.getElementById('screen-game').classList.remove('active');
    const hist=loadPast(), sec=document.getElementById('past-section'), lst=document.getElementById('past-list');
    if(hist.length){
      sec.style.display='block';
      lst.innerHTML=hist.map(h=>`<div class="past-game"><div class="past-game-teams">${h.away} ${h.aScore} – ${h.hScore} ${h.home}</div><div class="past-game-meta">${h.date} · ${h.innings} innings</div></div>`).join('');
    }
  }
  function showGame(){
    document.getElementById('screen-setup').classList.remove('active');
    document.getElementById('screen-game').classList.add('active');
    render();
  }

  // ── Actions ───────────────────────────────────────────────────
  function undo(){
    if(!g._hist.length) return;
    const prev=JSON.parse(g._hist.pop());
    const hist=g._hist;
    g=prev; g._hist=hist;
    save(); render();
  }

  function addRun(team){
    if(g.gameOver) return;
    const runs=team==='away'?g.awayRuns[g.inning]:g.homeRuns[g.inning];
    const lim=limitFor(g.inning);
    if(lim && runs>=lim){ alert(`Run limit (${lim}) reached this half inning!`); return; }
    pushSnap(snap());
    if(team==='away') g.awayRuns[g.inning]++; else g.homeRuns[g.inning]++;
    save(); render();
  }

  function addOut(){
    if(g.gameOver) return;
    pushSnap(snap());
    g.outs++;
    if(g.outs>=3) advanceHalf();
    else { save(); render(); }
  }

  function toggleBase(idx){
    if(g.gameOver) return;
    pushSnap(snap());
    g.bases[idx]=!g.bases[idx];
    save(); render();
  }

  function adjCount(type,delta){
    if(g.gameOver) return;
    const max=type==='balls'?4:3;
    g[type]=Math.max(0,Math.min(max,g[type]+delta));
    save(); render();
  }

  function advanceHalf(){
    if(g.half==='away'){ g.half='home'; g.outs=0; }
    else{
      g.inning++; g.half='away'; g.outs=0;
      if(g.inning>=g.innings){ g.gameOver=true; saveToPast(g); }
    }
    g.bases=[false,false,false];
    g.balls=0; g.strikes=0;
    save(); render();
  }

  function nextHalf(){
    if(g.gameOver) return;
    pushSnap(snap());
    advanceHalf();
  }

  function setHalf(h){
    pushSnap(snap());
    g.half=h;
    save(); render();
  }

  // ── Lineup / batter ───────────────────────────────────────────
  function addBatter(){
    const inp=document.getElementById('new-batter');
    const name=inp.value.trim(); if(!name) return;
    const team=g.half;
    if(team==='away') g.lineupAway.push(name); else g.lineupHome.push(name);
    inp.value=''; save(); render();
  }

  function advanceBatter(){
    pushSnap(snap());
    g.balls=0; g.strikes=0;
    if(g.half==='away'){ const n=g.lineupAway.length; if(!n) return; g.batterAway=(g.batterAway+1)%n; }
    else { const n=g.lineupHome.length; if(!n) return; g.batterHome=(g.batterHome+1)%n; }
    save(); render();
  }

  function setBatter(team,idx){
    pushSnap(snap());
    g.balls=0; g.strikes=0;
    if(team==='away') g.batterAway=idx; else g.batterHome=idx;
    save(); render();
  }

  function removeBatter(team,idx){
    pushSnap(snap());
    if(team==='away'){ g.lineupAway.splice(idx,1); if(g.batterAway>=g.lineupAway.length) g.batterAway=0; }
    else { g.lineupHome.splice(idx,1); if(g.batterHome>=g.lineupHome.length) g.batterHome=0; }
    save(); render();
  }

  // playerStatus key = "away-3"
  function cycleStatus(team,idx){
    pushSnap(snap());
    const k=team+'-'+idx;
    const cur=g.playerStatus[k]||'none';
    const next={none:'base',base:'scored',scored:'out',out:'none'};
    g.playerStatus[k]=next[cur];
    save(); render();
  }

  function statusLabel(team,idx){
    const v=(g.playerStatus||{})[team+'-'+idx]||'none';
    const map={none:'—',base:'On base',scored:'Scored',out:'Out'};
    const cls={none:'bs-none',base:'bs-base',scored:'bs-scored',out:'bs-out'};
    return `<span class="base-status ${cls[v]}" onclick="event.stopPropagation();cycleStatus('${team}',${idx})">${map[v]}</span>`;
  }

  // ── Render ────────────────────────────────────────────────────
  function render(){
    if(!g) return;
    const aT=sum(g.awayRuns), hT=sum(g.homeRuns);

    document.getElementById('h-away').textContent=g.away;
    document.getElementById('h-home').textContent=g.home;
    document.getElementById('h-ascore').textContent=aT;
    document.getElementById('h-hscore').textContent=hT;
    document.getElementById('g-date').textContent=g.date;

    const inn=Math.min(g.inning+1,g.innings);
    document.getElementById('h-inning').textContent=g.gameOver?'Final':`Inning ${inn}`;
    document.getElementById('h-half').textContent=g.gameOver?'':(g.half==='away'?`${g.away} batting`:`${g.home} batting`);

    // limit label
    const limDesc=()=>{
      if(g.limitStyle==='none') return '';
      if(g.limitStyle==='single') return `Limit: ${g.runLimit}/inn`;
      const l=g.lateLimit===999?'∞':g.lateLimit;
      return `Limit: ${g.earlyLimit}→${l} (inn ${g.switchAfter+1}+)`;
    };
    document.getElementById('h-limit').textContent=limDesc();

    // game over
    const ob=document.getElementById('over-banner');
    if(g.gameOver){
      ob.style.display='block';
      const w=aT>hT?g.away:hT>aT?g.home:null;
      ob.textContent=w?`Game over — ${w} wins! (${aT}–${hT})`:`Game over — Tie! (${aT}–${aT})`;
    } else ob.style.display='none';

    // outs
    for(let i=0;i<3;i++) document.getElementById(`od${i}`).className='out-dot'+(i<g.outs?' filled':'');

    // inning runs / runs left
    const innR=g.half==='away'?g.awayRuns[g.inning]:g.homeRuns[g.inning];
    const lim=g.gameOver?0:limitFor(g.inning);
    document.getElementById('st-innruns').textContent=g.gameOver?'—':innR;
    const le=document.getElementById('st-left');
    if(!lim||g.gameOver){ le.textContent='—'; le.className='val'; }
    else { const left=Math.max(0,lim-innR); le.textContent=left; le.className='val'+(left===0?' danger':left<=1?' warn':''); }

    // bases diamond
    const bids=['b1','b2','b3'];
    bids.forEach((id,i)=>{ document.getElementById(id).className='base '+(id==='b1'?'base-1st':id==='b2'?'base-2nd':'base-3rd')+(g.bases[i]?' on':''); });

    // count
    document.getElementById('ct-balls').textContent=g.balls;
    document.getElementById('ct-strikes').textContent=g.strikes;
    const bd=document.getElementById('ball-dots');
    bd.innerHTML=[0,1,2,3].map(i=>`<div class="count-dot${i<g.balls?' filled-b':''}"></div>`).join('');
    const sd=document.getElementById('strike-dots');
    sd.innerHTML=[0,1,2].map(i=>`<div class="count-dot${i<g.strikes?' filled-s':''}"></div>`).join('');

    // toggles
    document.getElementById('tog-away').textContent=g.away+' batting';
    document.getElementById('tog-home').textContent=g.home+' batting';
    document.getElementById('tog-away').className='toggle-btn'+(g.half==='away'?' active-away':'');
    document.getElementById('tog-home').className='toggle-btn'+(g.half==='home'?' active-home':'');
    document.getElementById('cl-away').textContent=g.away+' run';
    document.getElementById('cl-home').textContent=g.home+' run';
    const isLast=g.inning>=g.innings-1;
    document.getElementById('cl-next').textContent=g.half==='away'?'End top / start bottom':(isLast?'End game':'End bottom / next inn');

    // inning table
    const tb=document.getElementById('inn-table');
    let th='<tr><th>Team</th>';
    for(let i=0;i<g.innings;i++) th+=`<th>${i+1}</th>`;
    th+='<th>R</th></tr>';

    const makeRow=(name,runs,total,isActive)=>{
      let r=`<tr><td class="team-label">${name}</td>`;
      for(let i=0;i<g.innings;i++){
        const active=!g.gameOver&&i===g.inning&&isActive;
        const limi=limitFor(i);
        const atLim=limi&&runs[i]>=limi;
        const shown=i<g.inning||(i===g.inning&&!isActive)||g.gameOver?runs[i]:(active?`<b>${runs[i]}</b>`:'—');
        r+=`<td class="${active?'active-inn':''}${atLim?' at-limit':''}">${shown}</td>`;
      }
      r+=`<td class="total-col">${total}</td></tr>`;
      return r;
    };
    tb.innerHTML=th+makeRow(g.away,g.awayRuns,aT,!g.gameOver&&g.half==='away')+makeRow(g.home,g.homeRuns,hT,!g.gameOver&&g.half==='home');

    // lineup
    const team=g.half;
    const lineup=team==='away'?g.lineupAway:g.lineupHome;
    const bi=team==='away'?g.batterAway:g.batterHome;
    const onDeck=lineup.length>1?(bi+1)%lineup.length:null;
    document.getElementById('lineup-team').textContent=team==='away'?g.away:g.home;

    const ll=document.getElementById('lineup-list');
    if(!lineup.length){
      ll.innerHTML='<div style="color:#666;font-size:13px;padding:6px 0">No players added yet.</div>';
    } else {
      ll.innerHTML=lineup.map((p,i)=>{
        const isUp=i===bi, isDeck=i===onDeck;
        const badge=isUp?'<span class="bat-badge badge-up">▶ Up</span>':isDeck?'<span class="bat-badge badge-deck">On deck</span>':'';
        return `<div class="lineup-item ${isUp?'is-up':isDeck?'is-deck':''}" onclick="setBatter('${team}',${i})">
        <span class="batter-num">${i+1}</span>
        <span class="batter-name">${p}</span>
        ${statusLabel(team,i)}
        ${badge}
        <span style="color:#444;font-size:15px;padding:2px 4px" onclick="event.stopPropagation();removeBatter('${team}',${i})">✕</span>
      </div>`;
      }).join('');
    }
  }

  // ── Init ──────────────────────────────────────────────────────
  window.onload=()=>{
    toggleLimitStyle(); updateSwitchOpts();
    try{
      const s=localStorage.getItem(LSK);
      if(s){ g=JSON.parse(s); showGame(); return; }
    } catch{}
    showSetup();
  };
</script>
</body>
</html>
